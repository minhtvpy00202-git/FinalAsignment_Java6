spring:
  application:
    name: Asignment_Java5
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=ASM_Java5;encrypt=true;trustServerCertificate=true
    username: sa
    password: 123456Aa@
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
    open-in-view: false
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            scope:
              - openid
              - profile
              - email
server:
  port: 8080
  tomcat:
    max-part-count: 5000
    max-parameter-count: 10000
app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  debug:
    payos-response: ${APP_DEBUG_PAYOS_RESPONSE:false}
camera:
  hls-url: http://10.86.42.36:8888/index.m3u8
payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_API_KEY}
  checksum-key: ${PAYOS_CHECKSUM_KEY}
jwt:
  secret: ${JWT_SECRET:VGhpc0lzQVN1cGVyTG9uZ0RlbW9TZWNyZXRLZXlGb3JKV1RUb2tlblNpZ25pbmdBdExlYXN0MzJCeXRlcw==}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:86400000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
